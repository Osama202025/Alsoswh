name: The Behemoth Agent
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install groq
        run: pip install groq
      - name: Execute Behemoth Core
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent_core.py
