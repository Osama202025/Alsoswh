name: Behemoth-Empire-Core
on:
  push:
  workflow_dispatch:

jobs:
  evolution:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install groq

      - name: Execute Behemoth Kernel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python kernel.py

      - name: Finalize Evolution
        run: |
          git config --global user.name "Behemoth-Empire-Bot"
          git config --global user.email "bot@behemoth.empire"
          git add .
          # دمج التغييرات بذكاء
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Empire Evolution: Automated self-optimization"
            git pull origin main --rebase --autostash
            git push origin main
          fi
