name: Behemoth Auto-Evolve
on:
  schedule:
    - cron: '0 * * * *'  # سيعمل النظام تلقائياً في بداية كل ساعة
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_evolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install groq
      - name: Evolve System
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent_core.py
