name: The Behemoth Agent
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # هذه هي الصلاحية التي تسمح له بالتعديل

jobs:
  run_agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # استخدام التوكن الخاص بـ GitHub
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install groq
        
      - name: Execute Behemoth Core
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent_core.py
