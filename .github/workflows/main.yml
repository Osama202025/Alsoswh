name: Behemoth-Nexus-Prime
on:
  push:
  workflow_dispatch:

jobs:
  evolution:
    runs-on: ubuntu-latest
    permissions: contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Unleash The Nexus
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 kernel.py
      - name: Stabilize and Deploy
        run: |
          git config --global user.name "Behemoth-Prime"
          git config --global user.email "nexus@behemoth.empire"
          git add BEHEMOTH_NEXUS/
          git commit -m "Nexus Prime: Total System Expansion" || echo "Stable"
          git push
