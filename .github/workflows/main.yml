name: Behemoth-Nexus-Prime
on:
  push:
  workflow_dispatch:

jobs:
  evolution:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Latest SDKs
        run: |
          pip install --upgrade pip
          pip install google-genai groq openai
      - name: Execute Nexus
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python kernel.py
      - name: Commit Results
        run: |
          git config --global user.name "Behemoth-Prime"
          git config --global user.email "nexus@behemoth.empire"
          git add .
          git commit -m "Nexus Evolution: Latest SDKs Applied" || echo "Stable"
          git push
